<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenScripts HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow-bl"></div>
  <div class="bg-glow-tr"></div>

  <div class="logo-area">
    <div class="logo-text"><span>Green</span>Scripts <span class="logo-hub">HUB</span></div>
  </div>

  <div class="cards-wrapper">

    <!-- Card 1: Pegar Scripts -->
    <div class="card card1">
      <div class="card-top-bar"></div>
      <div class="glow-dot"></div>
      <div class="card-inner">
        <div class="card-header">
          <h2 class="card-title">Pegar<br>Scripts</h2>
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 6L4 12L8 18" stroke="#22ff66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 6L20 12L16 18" stroke="#22ff66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 4L10 20" stroke="rgba(34,255,102,0.45)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <hr class="card-divider">
        <p class="card-desc">Pegue todos os scripts criados pelo GreenScripts de graça. Atualizado regularmente com novos conteúdos e correções.</p>
        <div class="card-footer">
          <span class="card-badge">Grátis</span>
          <a href="scripts.html">
            <button class="access-btn">
              <span class="btn-label">Acessar <span class="btn-arrow">→</span></span>
            </button>
          </a>
        </div>
      </div>
    </div>

    <!-- Card 2: Pegar Keys -->
    <div class="card card2">
      <div class="card-top-bar"></div>
      <div class="glow-dot"></div>
      <div class="card-inner">
        <div class="card-header">
          <h2 class="card-title">Pegar<br>Chaves</h2>
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="8.5" cy="11" r="4" stroke="#22ff66" stroke-width="1.8"/>
              <path d="M12.5 11H21" stroke="#22ff66" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M19 11V14" stroke="#22ff66" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M16 11V13" stroke="rgba(34,255,102,0.6)" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <hr class="card-divider">
        <p class="card-desc">Pegue Chaves válidas para todos os nossos scripts de graça. Entrega rápida, sempre funcionando, sem complicação.</p>
        <div class="card-footer">
          <span class="card-badge">Grátis</span>
          <a href="getKey.html">
              <button  class="access-btn">
                <span class="btn-label">Acessar <span class="btn-arrow">→</span></span>
              </button>
          </a>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
