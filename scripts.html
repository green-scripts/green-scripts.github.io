<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenScripts HUB — Scripts</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scripts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow-bl"></div>
  <div class="bg-glow-tr"></div>

  <div class="page-layout">
    <!-- Conteúdo principal -->
    <main class="main-content">

      <!-- Cabeçalho -->
      <div class="page-header">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <div class="logo-area" style="margin-bottom:0;">
          <div class="logo-text"><span>Green</span>Scripts <span class="logo-hub">HUB</span></div>
          <div class="logo-sub">Scripts disponíveis</div>
        </div>
      </div>

      <!-- Grade de scripts -->
      <div class="scripts-grid">

        <!-- Card Script: Redação 1 -->
        <div class="script-card">
          <div class="card-top-bar"></div>
          <div class="script-card-img-wrap">
            <img src="Imagens/RedaçãoParanaIcon.png" alt="Redação 1" class="script-card-img">
            <div class="script-card-img-overlay"></div>
          </div>
          <div class="script-card-body">
            <div class="script-card-title-row">
              <h3 class="script-card-title">Redação Paraná</h3>
              <span class="card-badge">Grátis</span>
            </div>
            <hr class="card-divider">
            <p class="script-card-desc">Script para redações com colagem automática</p>
            <div class="script-card-footer">
              <div class="script-meta">
                <span class="script-tag">v1.0</span>
                <span class="script-tag">Ativo</span>
              </div>
              <a href="ScriptsCard/RedPR.html">
                  <button class="access-btn">
                    <span class="btn-label">Usar <span class="btn-arrow">→</span></span>
                  </button>
              </a>
            </div>
          </div>
        </div>

        <!-- Adicione mais cards aqui seguindo o mesmo padrão -->

      </div>
    </main>
  </div>

  <!-- Banner rodapé (468x60) -->
  <div class="banner-wrap banner-bottom">
    <div class="banner banner-468x60">
      <span class="banner-label">468×60</span>
    </div>
  </div>

</body>
</html>
