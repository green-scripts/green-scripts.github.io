<body>

  <div class="bg-glow-bl"></div>
  <div class="bg-glow-tr"></div>

  <div class="page-layout">
    <!-- Conteúdo principal -->
    <main class="main-content">

      <!-- Cabeçalho -->

        <a href="index.html" class="btn-voltar">← Voltar</a>
        <div class="logo-area" style="margin-bottom:0;">
          <div class="logo-text"><span>Green</span>Scripts <span class="logo-hub">HUB</span></div>
          <div class="logo-sub">Scripts disponíveis</div>
        </div>
      </div>

      <!-- Grade de scripts -->
      <div class="scripts-grid">

        <!-- Card Script: Redação 1 -->
        <div class="script-card">
          <div class="card-top-bar"></div>
          <div class="script-card-img-wrap">
            <img src="Imagens/RedaçãoParanaIcon.png" alt="Redação 1" class="script-card-img">
            <div class="script-card-img-overlay"></div>

          <div class="script-card-body">
            <div class="script-card-title-row">

        <!-- Adicione mais cards aqui seguindo o mesmo padrão -->

      </div>
    </main>
  </div>

  <script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient('https://btdbraicotnkhfkexwyh.supabase.co', "REMOVED_KEY")
  const canal = supabase.channel('analytics')

  const join_in = new Date().toISOString()
  const page = "script"
  const admCookie = document.cookie.match('(^|;)\\s*admin\\s*=\\s*([^;]+)')?.[2] || null;
  const URL = 'https://btdbraicotnkhfkexwyh.supabase.co/functions/v1/PageTime'
  const anomKey = 'REMOVED_KEY'

  let enviado = false

  function enviarDados(arrive_in, leave_in, session_time_sec) {
    if (enviado) return
    enviado = true

    fetch(URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${anomKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ page, arrive_in, leave_in, session_time_sec, admCookie }),
      keepalive: true
    })
  }

  canal.on('presence', { event: 'sync' }, () => {})
  .subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await canal.track({ page, join_in })
    }
  })

  window.addEventListener('beforeunload', () => {
    const leave_in = new Date().toISOString()
    const session_time_sec = Math.floor(
      (new Date(leave_in) - new Date(join_in)) / 1000
    )
    if (admCookie === null)
    {
      enviarDados(join_in, leave_in, session_time_sec)
    }
    else
    {
      console.log("nao me hackeia por favor 😭)")
    }
  })
</script>

</body>
