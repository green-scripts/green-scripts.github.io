<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Scripts | Chave Gerada</title>
  <link rel="stylesheet" href="getKey.css">
  <link rel="shortcut icon" href="Imagens/GreenScriptsLogo.png" type="image/x-icon">k
</head>
<body>

  <div id="loader">
    <div class="loader-inner">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
      <p class="loader-text">Estamos Redirecionando você</p>
    </div>
  </div>

  <div>
    <h1>⚠️Estamos com nossos serviços indisponiveis no momento⚠️</h1>
  </div>

  <script>
    function copiar() {
      const texto = document.getElementById('chave').textContent;
      if (!texto.trim()) return;
      navigator.clipboard.writeText(texto).then(() => {
        const btn = document.getElementById('copyBtn');
        const txt = document.getElementById('btnText');
        btn.classList.add('copied');
        txt.textContent = 'Copiado!';
        setTimeout(() => {
          btn.classList.remove('copied');
          txt.textContent = 'Copiar chave';
        }, 2000);
      });
    }
  </script>

  <script src="getKey.js"></script>
</body>
</html>
